body{font-family:'Pretendard Variable',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}

.header-logo{font-size:20px;font-weight:700;color:var(--coral);letter-spacing:-.5px}
.header-icon{width:32px;height:32px;border-radius:50%;background:var(--gray100);display:flex;align-items:center;justify-content:center;cursor:pointer}

.bn{font-size:32px;font-weight:700;letter-spacing:-1px}.bs{font-size:14px;color:var(--text2);margin-top:2px}

.qsi:not(:last-child)::after{content:'';position:absolute;right:0;top:20%;height:60%;width:.5px;background:var(--border)}

.cat-grid{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 16px}

.cat-icon{width:44px;height:44px;border-radius:14px;background:var(--gray100);border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .15s}

.si{display:flex;align-items:center;padding:16px 20px;gap:14px;cursor:pointer;transition:background .15s;position:relative}
.si:active{background:var(--gray100)}

.sr{font-size:16px;font-weight:700;min-width:24px;text-align:center;color:var(--text3)}.sr.t3{color:var(--coral)}
.sa{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

.tph{background:var(--amber-light);color:var(--amber-dark)}.tpl{background:var(--red-light);color:var(--red-dark)}

.hb{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:var(--coral-light);border-radius:14px;cursor:pointer;transition:all .2s;border:none;width:100%;font-family:inherit}

.search-overlay{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100dvh;background:var(--bg);z-index:50;overflow-y:auto;display:none}
.search-overlay.open{display:block}

.nr-actions{display:flex;gap:8px;margin-top:12px}
.nr-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}

.section-title{padding:14px 20px 8px;font-size:13px;color:var(--text3);font-weight:500;background:var(--bg)}
.search-loading{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.loading-spinner{width:24px;height:24px;border:3px solid var(--gray200);border-top-color:var(--naver);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.hot-keyword{display:inline-flex;padding:8px 16px;background:var(--white);border:.5px solid var(--border);border-radius:20px;font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.af{animation:fadeUp .4s cubic-bezier(.25,.46,.45,.94) both}
.ad1{animation-delay:.05s}.ad2{animation-delay:.1s}.ad3{animation-delay:.15s}
</style>

  if (c.includes('한식') || c.includes('한정식') || c.includes('비빔') || c.includes('분식')) return '한식';
  return '한식';
}

function tier(h){if(h>=10000)return{l:'전설',c:'tpl',bg:'var(--red-light)'};if(h>=1000)return{l:'인기',c:'tph',bg:'var(--amber-light)'};if(h>=100)return{l:'정식',c:'tpo',bg:'var(--primary-light)'};return{l:'후보',c:'tpc',bg:'var(--gray100)'};}
function prog(h){if(h>=10000)return{p:100,c:'ptf-d',t:'전설 달성!'};if(h>=1000)return{p:Math.round(h/10000*100),c:'ptf-h',t:(10000-h).toLocaleString()+'개 남음'};if(h>=100)return{p:Math.round(h/1000*100),c:'ptf-m',t:(1000-h).toLocaleString()+'개 남음'};return{p:Math.round(h/100*100),c:'ptf-l',t:(100-h)+'개 남음'};}
function distKm(lat,lng){const d=Math.sqrt(Math.pow((lat-JEONJU_CENTER.lat)*111,2)+Math.pow((lng-JEONJU_CENTER.lng)*88,2));return d<1?Math.round(d*1000)+'m':d.toFixed(1)+'km';}
function distNum(s){return Math.sqrt(Math.pow(((s.lat||35.82)-JEONJU_CENTER.lat)*111,2)+Math.pow(((s.lng||127.14)-JEONJU_CENTER.lng)*88,2));}

async function doSearch(q) {
  S.searchQ = q;
  if (!q.trim()) { S.searchResults = []; S.searchLoading = false; renderSearch(); return; }

  S.searchLoading = true;
  renderSearch();

  try {
    // /api/search 엔드포인트 호출 (Vercel 서버리스 함수)
    const res = await fetch('/api/search?query=' + encodeURIComponent('전주 ' + q) + '&display=10');
    const data = await res.json();

    if (data.error) {
      toast('API 오류: ' + data.error);
      S.searchResults = [];
    } else {
      S.searchResults = (data.items || []).map(item => ({
        name: item.name,
        cat: mapCategory(item.category),
        catRaw: item.category,
        addr: item.address,
        tel: item.telephone,
        link: item.link,
        desc: item.description,
        franchise: item.franchise,
        mapx: item.mapx,
        mapy: item.mapy,
      }));
    }
  } catch (err) {
    toast('검색 실패 — API 연결을 확인해주세요');
    S.searchResults = [];
  }
  S.searchLoading = false;
  renderSearch();
}

// 네이버 검색 결과를 여기에만에 등록
function importFromNaver(idx) {
  const n = S.searchResults[idx];
  if (!n) return;
  if (n.franchise) { toast('프랜차이즈는 등록할 수 없어요'); return; }
  if (shops.find(s => s.name === n.name && s.addr === n.addr)) { toast('이미 등록된 맛집이에요'); return; }

  // 네이버 좌표 변환 (카텍 → 위경도 근사)
  let lat = 35.82, lng = 127.14;
  if (n.mapx && n.mapy) {
    // 네이버 로컬 API 좌표는 카텍(KATEC) 좌표계
    lng = Number(n.mapx) / 10000000;
    lat = Number(n.mapy) / 10000000;
    // 근사값이 이상하면 전주 중심으로 폴백
    if (lat < 35 || lat > 36.5 || lng < 126 || lng > 128) { lat = 35.82; lng = 127.14; }
  }

  shops.push({
    id: Date.now(),
    name: n.name,
    area: guessArea(lat, lng),
    cat: n.cat,
    desc: n.desc || n.catRaw || '',
    tags: n.catRaw ? n.catRaw.split('>').map(t => t.trim()).filter(Boolean).slice(-2) : [],
    hearts: 0,
    h: false,
    addr: n.addr,
    tel: n.tel,
    link: n.link,
    lat, lng,
  });
  saveShops();
  toast(n.name + ' 등록 완료!');
  renderSearch();
  render();
}

function guessArea(lat, lng) {
  const areas = [
    {name:'한옥마을',lat:35.8150,lng:127.1530},
    {name:'효자동',lat:35.8230,lng:127.1290},
    {name:'덕진동',lat:35.8380,lng:127.1420},
    {name:'중화산동',lat:35.8190,lng:127.1350},
    {name:'평화동',lat:35.8250,lng:127.1620},
    {name:'송천동',lat:35.8450,lng:127.1180},
    {name:'객사길',lat:35.8170,lng:127.1470},
  ];
  let min = Infinity, best = '전주';
  areas.forEach(a => {
    const d = Math.pow(lat - a.lat, 2) + Math.pow(lng - a.lng, 2);
    if (d < min) { min = d; best = a.name; }
  });
  return best;
}

// ===== 네이버 지도 초기화 =====
function initNaverMap(containerId, shopList) {
  if (typeof naver === 'undefined' || !naver.maps) {
    document.getElementById(containerId).innerHTML =
      '<div class="map-fallback"><div style="font-size:32px">🗺</div>' +
      '<div>네이버 지도 API 키를 설정하면<br>실제 지도가 표시됩니다</div>' +
      '<div style="font-size:12px;margin-top:8px;color:var(--primary)">배포가이드.md 참고</div></div>';
    return;
  }

  const map = new naver.maps.Map(containerId, {
    center: new naver.maps.LatLng(JEONJU_CENTER.lat, JEONJU_CENTER.lng),
    zoom: 13,
    mapTypeControl: false,
    scaleControl: false,
  });

  // 내 위치 마커
  new naver.maps.Marker({
    position: new naver.maps.LatLng(JEONJU_CENTER.lat, JEONJU_CENTER.lng),
    map,
    icon: { content: '<div style="width:16px;height:16px;background:#3182F6;border:3px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(49,130,246,.4)"></div>', anchor: new naver.maps.Point(8, 8) },
  });

  // 맛집 마커
  shopList.forEach(s => {
    if (!s.lat || !s.lng) return;
    const color = s.hearts >= 10000 ? '#F04452' : s.hearts >= 1000 ? '#FF9F0A' : s.hearts >= 100 ? '#3182F6' : '#B4B2A9';
    const size = s.hearts >= 1000 ? 14 : s.hearts >= 100 ? 12 : 10;
    const marker = new naver.maps.Marker({
      position: new naver.maps.LatLng(s.lat, s.lng),
      map,
      icon: { content: '<div style="width:' + size + 'px;height:' + size + 'px;background:' + color + ';border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.2)"></div>', anchor: new naver.maps.Point(size / 2, size / 2) },
    });
    const infoW = new naver.maps.InfoWindow({
      content: '<div style="padding:12px 16px;font-family:Pretendard Variable,sans-serif;min-width:160px">' +
        '<div style="font-weight:600;font-size:14px">' + s.name + '</div>' +
        '<div style="font-size:12px;color:#6B7684;margin-top:2px">' + s.area + ' · ' + s.cat + '</div>' +
        '<div style="font-size:13px;color:#D85A30;font-weight:600;margin-top:4px">' + s.hearts.toLocaleString() + ' 하트</div></div>',
      borderWidth: 0,
      backgroundColor: '#fff',
      anchorSize: { width: 8, height: 8 },
    });
    naver.maps.Event.addListener(marker, 'click', () => {
      if (infoW.getMap()) infoW.close();
      else infoW.open(map, marker);
    });
  });
}

  const total = shops.reduce((a, b) => a + b.hearts, 0);

  return '<div class="s"><div class="sp">' +
    '<div style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text2);margin-bottom:8px">📍 전주 덕진동</div>' +
    '<div class="bn">' + total.toLocaleString() + ' <span style="font-size:16px;font-weight:500;color:var(--text2)">하트</span></div>' +
    '<div class="bs">하트 100개 이상이면 정식 등록돼요</div></div>' +
    '<div class="qs"><div class="qsi"><div class="qn">' + shops.length + '</div><div class="ql">전체</div></div>' +
    '<div class="qsi"><div class="qn" style="color:var(--primary)">' + off.length + '</div><div class="ql">정식 등록</div></div>' +
    '<div class="qsi"><div class="qn" style="color:var(--coral)">' + (shops.length - off.length) + '</div><div class="ql">도전 중</div></div></div></div>' +
    '<div class="s" style="padding:16px 0 8px"><div class="cat-grid">' + CATS.map(c => '<div class="cat-item' + (S.cat === c.id ? ' on' : '') + '" onclick="S.cat=\'' + c.id + '\';render()"><div class="cat-icon">' + c.emoji + '</div><div class="cat-name">' + c.name + '</div></div>').join('') + '</div></div>' +
    (nearby.length ? '<div class="s"><div class="sp" style="padding-bottom:4px"><div style="display:flex;align-items:center;gap:8px"><span class="nearby-badge">📍 내 주변</span><span style="font-size:15px;font-weight:600">가까운 핫플</span></div></div>' + nearby.map((s, i) => shopRow(s, i + 1, true)).join('') + '</div>' : '') +
    (hot.length ? '<div class="s"><div class="sp" style="padding-bottom:4px"><div style="font-size:15px;font-weight:600">🔥 지금 가장 핫한 맛집</div></div>' + hot.map((s, i) => shopRow(s, i + 1, false)).join('') + '</div>' : '') +
    (cand.length ? '<div class="s"><div class="sp" style="padding-bottom:4px"><div style="font-size:15px;font-weight:600">도전 중인 맛집</div></div>' + cand.map(s => shopRow(s, 0, true)).join('') + '</div>' : '');
}

function renderMap() {
  let list = fc([...shops]);
  return '<div class="s" style="padding:12px 0 8px"><div class="cat-grid">' + CATS.map(c => '<div class="cat-item' + (S.cat === c.id ? ' on' : '') + '" onclick="S.cat=\'' + c.id + '\';render()"><div class="cat-icon">' + c.emoji + '</div><div class="cat-name">' + c.name + '</div></div>').join('') + '</div></div>' +
    '<div class="s" style="margin-bottom:0"><div id="naverMap"></div>' +
    '<div class="ml"><div class="mli"><div class="mld" style="background:var(--primary)"></div>내 위치</div><div class="mli"><div class="mld" style="background:#B4B2A9"></div>후보</div><div class="mli"><div class="mld" style="background:#3182F6"></div>정식</div><div class="mli"><div class="mld" style="background:#FF9F0A"></div>인기</div><div class="mli"><div class="mld" style="background:#F04452"></div>전설</div></div></div>';
}

function renderOfficial() {
  const off = shops.filter(s => s.hearts >= 100); let list = [...off];
  if (S.oArea !== '전체') list = list.filter(s => s.area === S.oArea);
  if (S.oCat !== 'all') list = list.filter(s => s.cat === S.oCat);
  list.sort((a, b) => b.hearts - a.hearts);
  return '<div class="s"><div class="sp"><div style="font-size:14px;color:var(--text3)">정식 등록 맛집</div>' +
    '<div class="bn" style="margin-top:4px">' + off.length + '<span style="font-size:16px;font-weight:500;color:var(--text2)"> 곳</span></div>' +
    '<div class="bs">하트 100개 이상 검증된 맛집</div></div></div>' +
    '<div class="s" style="padding:12px 0"><div class="chip-r" style="margin-bottom:8px">' + AREAS.map(a => '<button class="chip' + (S.oArea === a ? ' on' : '') + '" onclick="S.oArea=\'' + a + '\';render()">' + a + '</button>').join('') + '</div>' +
    '<div class="cat-grid" style="padding:0 16px">' + CATS.map(c => '<div class="cat-item' + (S.oCat === c.id ? ' on' : '') + '" onclick="S.oCat=\'' + c.id + '\';render()"><div class="cat-icon">' + c.emoji + '</div><div class="cat-name">' + c.name + '</div></div>').join('') + '</div></div>' +
    (list.length ? '<div class="s">' + list.map((s, i) => shopRow(s, i + 1, true)).join('') + '</div>' : '<div class="s"><div class="empty">해당 조건의 정식 맛집이 없어요</div></div>');
}

function renderRegister() {
  const f = S.form, co = CATS.filter(c => c.id !== 'all');
  return '<div class="s"><div class="sp"><div style="font-size:14px;color:var(--text3)">맛집 등록</div><div class="bn" style="font-size:24px;margin-top:4px">맛집 후보 등록하기</div><div class="bs">네이버 플레이스 검색 또는 직접 등록</div></div></div>' +
    '<div class="s"><div class="sp" style="padding-bottom:12px">' +
    '<div style="display:flex;align-items:center;gap:12px;padding:16px;background:var(--naver-light);border-radius:14px;cursor:pointer;margin-bottom:16px" onclick="S.searchOpen=true;renderSearch()">' +
    '<span class="naver-badge" style="font-size:13px;padding:5px 10px">N</span><div style="flex:1"><div style="font-size:15px;font-weight:600;color:var(--naver-dark)">네이버 플레이스에서 검색</div><div style="font-size:12px;color:var(--green-dark);margin-top:2px;opacity:.7">실시간으로 검색하고 바로 등록할 수 있어요</div></div>' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="var(--naver-dark)" stroke-width="2" style="width:18px;height:18px"><path d="M9 18l6-6-6-6"/></svg></div>' +
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><div style="flex:1;height:.5px;background:var(--border)"></div><span style="font-size:12px;color:var(--text3)">또는 직접 등록</span><div style="flex:1;height:.5px;background:var(--border)"></div></div>' +
    '<div class="fg"><div class="fl">가게 이름</div><input class="fi" value="' + f.name + '" placeholder="예: 할매국밥" oninput="S.form.name=this.value"/></div>' +
    '<div style="display:flex;gap:10px"><div class="fg" style="flex:1"><div class="fl">지역</div><select class="fi fsel" onchange="S.form.area=this.value">' + AREAS.filter(a => a !== '전체').map(a => '<option' + (f.area === a ? ' selected' : '') + '>' + a + '</option>').join('') + '</select></div>' +
    '<div class="fg" style="flex:1"><div class="fl">카테고리</div><select class="fi fsel" onchange="S.form.cat=this.value">' + co.map(c => '<option value="' + c.id + '"' + (f.cat === c.id ? ' selected' : '') + '>' + c.emoji + ' ' + c.name + '</option>').join('') + '</select></div></div>' +
    '<div class="fg"><div class="fl">소개글</div><textarea class="fi fta" placeholder="이 맛집만의 특별한 점" oninput="S.form.desc=this.value">' + f.desc + '</textarea></div>' +
    '<div class="fw">프랜차이즈 업체는 등록할 수 없어요.</div>' +
    '<button class="fsb" onclick="submitForm()">등록하기</button></div></div>';
}

function renderInfo() {
  return '<div class="s"><div class="sp"><div style="font-size:14px;color:var(--text3)">안내</div><div class="bn" style="font-size:24px;margin-top:4px">하트 시스템</div><div class="bs">사용자들의 하트로 맛집이 만들어져요</div></div></div>' +
    '<div class="s"><div class="sp">' +
    '<div class="ic"><div class="ii" style="background:var(--gray100)">·</div><div><div class="it">후보 (0~99)</div><div class="id">하트를 모아주세요</div></div></div>' +
    '<div class="ic"><div class="ii" style="background:var(--primary-light)">✓</div><div><div class="it" style="color:var(--primary-dark)">정식 등록 (100+)</div><div class="id">공식 맛집으로 등록</div></div></div>' +
    '<div class="ic"><div class="ii" style="background:var(--amber-light)">♥</div><div><div class="it" style="color:var(--amber-dark)">인기 맛집 (1,000+)</div><div class="id">메인에 추천 노출</div></div></div>' +
    '<div class="ic"><div class="ii" style="background:var(--red-light)">♛</div><div><div class="it" style="color:var(--red-dark)">전설 맛집 (10,000+)</div><div class="id">명예의 전당!</div></div></div>' +
    '</div></div>';
}

function submitForm() {
  const f = S.form;
  if (!f.name.trim()) { toast('가게 이름을 입력해주세요'); return; }
  if (!f.desc.trim()) { toast('소개글을 입력해주세요'); return; }
  shops.push({ id: Date.now(), name: f.name.trim(), area: f.area, cat: f.cat, desc: f.desc.trim(), tags: [], hearts: 0, h: false, lat: JEONJU_CENTER.lat, lng: JEONJU_CENTER.lng });
  const nm = f.name;
  S.form = { name: '', area: '한옥마을', cat: '한식', desc: '', tags: '' };
  S.tab = 'home'; saveShops(); toast(nm + ' 후보로 등록했어요'); render();
}

// ===== 메인 렌더 =====
function render() {
  if (S.detail) { document.getElementById('app').innerHTML = renderDetail(); return; }
  const tabs = [
    { id: 'home', icon: '<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/>', l: '홈' },
    { id: 'map', icon: '<path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>', l: '지도' },
    { id: 'official', icon: '<path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>', l: '정식 맛집' },
    { id: 'register', icon: '<path d="M12 4v16m8-8H4"/>', l: '등록' },
    { id: 'info', icon: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4m0-4h.01"/>', l: '안내' },
  ];
  let c = '';
  if (S.tab === 'home') c = renderHome();
  else if (S.tab === 'map') c = renderMap();
  else if (S.tab === 'official') c = renderOfficial();
  else if (S.tab === 'register') c = renderRegister();
  else if (S.tab === 'info') c = renderInfo();

  document.getElementById('app').innerHTML =
    '<div class="header"><div class="header-logo">여기에만</div>' +
    '<div class="header-icon" onclick="S.searchOpen=true;renderSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div></div>' +
    c +
    '<nav class="bnav">' + tabs.map(t =>
      '<button class="' + (S.tab === t.id ? 'on' : '') + '" onclick="S.tab=\'' + t.id + '\';render()">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + t.icon + '</svg>' +
      '<span>' + t.l + '</span></button>'
    ).join('') + '</nav>';

  // 지도 탭이면 네이버 지도 초기화
  if (S.tab === 'map') {
    setTimeout(() => initNaverMap('naverMap', fc([...shops])), 100);
  }
}

render();
</script>
</body>
</html>
